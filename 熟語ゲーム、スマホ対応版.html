            width: 50px;

            background-color: #e0e7ff;

        }

            width: 46px;
            height: 46px;

            justify-content: center;

            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);

            touch-action: none;
            position: absolute;
            z-index: 10;
            cursor: grab;
            color: #1e293b;

            position: fixed !important;
            z-index: 9999 !important;

            pointer-events: none;

            top: 0 !important;
            transform: none !important;
            z-index: 5;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            if (type === 'pick') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);
                gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'drop') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(300, now); gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                [523, 659, 783].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.frequency.setValueAtTime(f, now + i * 0.1); g.gain.setValueAtTime(0.2, now + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
                    o.start(now + i * 0.1); o.stop(now + i * 0.1 + 0.4);
                });
            } else if (type === 'wrong') {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                gain.gain.setValueAtTime(0.2, now); gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
        }

        // --- セーブ & ロード機能 ---

        function saveGame() {
            const saveData = {
                score: score,
                currentStage: currentStage,
                lapCount: lapCount,
                clearedWords: idiomData.filter(i => i.cleared).map(i => i.word),
                favorites: solvedIdioms.filter(i => i.isFavorite).map(i => i.word),
                solvedIdiomsList: solvedIdioms // 詳細な意味データも含めて保存
            };
            localStorage.setItem('idiomGameSave', JSON.stringify(saveData));
        }

        function loadGame() {
            const saved = localStorage.getItem('idiomGameSave');
            
            // idiomDataの初期化
            idiomData = baseIdiomData.map(item => ({ ...item, cleared: false }));
            
            if (saved) {
                const data = JSON.parse(saved);
                lapCount = data.lapCount || 1;
                score = data.score || 0;
                currentStage = data.currentStage || 1;
                
                // クリア済フラグの復元
                if (data.clearedWords) {
                    data.clearedWords.forEach(word => {
                        const target = idiomData.find(i => i.word === word);
                        if (target) target.cleared = true;
                    });
                }
                
                // 熟語帳の復元
                solvedIdioms = data.solvedIdiomsList || [];
                
                // お気に入り状態の同期
                if (data.favorites) {
                    solvedIdioms.forEach(s => {
                        s.isFavorite = data.favorites.includes(s.word);
                    });
                }

                scoreDisplay.innerText = score;
                levelDisplay.innerText = currentStage;
            }
            updateRemainingCount();
        }

            if (confirm("【確認1/2】本当に全てのセーブデータをリセットしますか？\nこれまでの進捗が全て消去されます。")) {
                if (confirm("【確認2/2】最終確認です。本当によろしいですか？\nこの操作は取り消せません。")) {
                    localStorage.removeItem('idiomGameSave');
                    location.reload(); // ページをリロードして初期状態に戻す
                }

                updateArchiveView(document.getElementById('archive-search').value);

        function getNextIdiom() {
    // 1. まず、まだクリアしていない熟語だけを抽出します
    let uncleared = idiomData.filter(i => !i.cleared);

    // 2. もし未クリアが一つもなければ（＝全クリアの状態）
    if (uncleared.length === 0) {
        // 【ここがポイント！】全データのクリアフラグを false（未クリア）にリセットします
        idiomData.forEach(i => i.cleared = false);
        
        // 3. リセットしたので、もう一度「未クリア」を抽出し直します（これで全員分になります）
        uncleared = idiomData.filter(i => !i.cleared);
        lapCount++;
        
        // 任意：リセットしたことをプレイヤーに伝えるならここでalert等を入れる
        console.log("全問題を解き終えたので、クリア判定をリセットしました！");
    }

    // 4. 山札（idiomDeck）が空の場合、現在の未クリアリストから新しい山札を作ります
    if (idiomDeck.length === 0) {
        idiomDeck = [...uncleared].sort(() => Math.random() - 0.5);
    }

    // 5. 山札から1問取り出して返します
    return idiomDeck.pop();
}

        function updateRemainingCount() {
            const clearedCount = idiomData.filter(i => i.cleared).length;
            remainingDisplay.innerText = `Cleared: ${clearedCount} / ${idiomData.length}`;
            const lapText = lapCount > 1 ? ` (${lapCount}周目)` : "";
            levelDisplay.innerText = `${currentStage}${lapText}`;
        }

        function loadLevel() {
            currentIdiom = getNextIdiom();
            updateRemainingCount();
            levelDisplay.innerText = currentStage;
            document.getElementById('word-info').innerText = `正解：${currentIdiom.word.length}文字`;
            answerArea.innerHTML = '';
            scatterArea.innerHTML = '';
            messageArea.classList.add('hidden');
            nextBtn.classList.add('hidden');
            rerollBtn.classList.remove('hidden');
            checkBtn.classList.remove('hidden');
            document.getElementById('question-hint').innerText = `読み：${currentIdiom.reading}`;

            for (let i = 0; i < currentIdiom.word.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'drop-slot';
                answerArea.appendChild(slot);
            }

            let allChars = currentIdiom.word.split('');
            while(allChars.length < currentIdiom.word.length + 2) {
                const d = dummyPool[Math.floor(Math.random() * dummyPool.length)];
                if(!allChars.includes(d)) allChars.push(d);
            }

            allChars.sort(() => Math.random() - 0.5).forEach((char) => {
    const card = document.createElement('div');
    card.className = 'kanji-card kanji-font';
    card.innerText = char;
    scatterArea.appendChild(card);
    
    const rect = scatterArea.getBoundingClientRect();
    const cardW = 50; 
    
    // X座標：左右に10pxの余白
    const x = Math.random() * (rect.width - cardW - 20) + 10;
    
    // Y座標：上部に10px、★下部に60px★の余白を空けるように変更
    // これにより、カードが画面下部のバーに重なりにくくなります
    const bottomMargin = 60; 
    const availableHeight = rect.height - cardW - 10 - bottomMargin;
    const y = Math.random() * (availableHeight > 0 ? availableHeight : 10) + 10;
    
    card.style.left = `${x}px`;
    card.style.top = `${y}px`;
    card.style.transform = `rotate(${(Math.random() - 0.5) * 15}deg)`;

    card.addEventListener('mousedown', startDragging);
    card.addEventListener('touchstart', startDragging, { passive: false });
});
        }

        function startDragging(e) {
            e.preventDefault();
            draggedElement = e.currentTarget;
            if (draggedElement.classList.contains('returning')) return;
            playSound('pick');
            const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const rect = draggedElement.getBoundingClientRect();
            startPos.offsetX = cx - rect.left; startPos.offsetY = cy - rect.top;
            draggedElement.classList.remove('placed');
            draggedElement.classList.add('dragging');
            updateDragPosition(cx, cy);
            window.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', stopDragging);
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('touchend', stopDragging);
        }

        function onMove(e) {
            if (!draggedElement) return;
            const cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            updateDragPosition(cx, cy);
            document.querySelectorAll('.drop-slot').forEach(slot => {
                const r = slot.getBoundingClientRect();
                if (cx > r.left && cx < r.right && cy > r.top && cy < r.bottom) slot.classList.add('active');
                else slot.classList.remove('active');
            });
        }

        function updateDragPosition(x, y) {
            draggedElement.style.left = `${x - startPos.offsetX}px`;
            draggedElement.style.top = `${y - startPos.offsetY}px`;
        }

        function stopDragging(e) {
            if (!draggedElement) return;
            const cx = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
            const cy = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
            const scatterRect = scatterArea.getBoundingClientRect();
            let foundSlot = null;
            document.querySelectorAll('.drop-slot').forEach(slot => {
                const r = slot.getBoundingClientRect();
                if (cx > r.left && cx < r.right && cy > r.top && cy < r.bottom && slot.children.length === 0) foundSlot = slot;
                slot.classList.remove('active');
            });
            draggedElement.classList.remove('dragging');
            if (foundSlot) {
                playSound('drop');
                draggedElement.style.position = 'relative';
                draggedElement.style.left = '0'; draggedElement.style.top = '0';
                draggedElement.style.transform = 'none';
                draggedElement.classList.add('placed');
                foundSlot.appendChild(draggedElement);
            } else {
                playSound('drop');
                draggedElement.style.position = 'absolute';
                scatterArea.appendChild(draggedElement);
                const cardW = draggedElement.offsetWidth || 50;
const padding = 10;
const bottomMarginLimit = 60; // 下から60px以内には止まらないようにする

let nx = cx - scatterRect.left - startPos.offsetX;
let ny = cy - scatterRect.top - startPos.offsetY;

// X軸の制限
if (nx < padding) nx = padding;
if (nx > scatterRect.width - cardW - padding) nx = scatterRect.width - cardW - padding;

// Y軸の制限（下部のマージンを考慮）
if (ny < padding) ny = padding;
if (ny > scatterRect.height - cardW - bottomMarginLimit) ny = scatterRect.height - cardW - bottomMarginLimit;

draggedElement.classList.add('returning');
draggedElement.style.left = `${nx}px`;
draggedElement.style.top = `${ny}px`;
                draggedElement.style.transform = `rotate(${(Math.random() - 0.5) * 15}deg)`;
                const el = draggedElement;
                setTimeout(() => el.classList.remove('returning'), 300);
            }
            window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', stopDragging);
            window.removeEventListener('touchmove', onMove); window.removeEventListener('touchend', stopDragging);
            draggedElement = null;
        }

        checkBtn.onclick = () => {
            const slots = document.querySelectorAll('.drop-slot');
            const result = Array.from(slots).map(s => s.children[0]?.innerText || '').join('');
            if (result === currentIdiom.word) {
                playSound('correct');
                comboCount++;
                const bonus = comboCount > 1 ? comboCount * 10 : 0;
                score += (currentIdiom.word.length * 20) + bonus;
                scoreDisplay.innerText = score;
                if (currentIdiom) {
    currentIdiom.cleared = true; 
}
                if (!solvedIdioms.find(i => i.word === currentIdiom.word)) {
                    solvedIdioms.unshift({...currentIdiom, isFavorite: false});
                }
                messageArea.classList.remove('hidden');
                nextBtn.classList.remove('hidden');
                rerollBtn.classList.add('hidden');
                checkBtn.classList.add('hidden');
                document.getElementById('answer-reading').innerText = 
                    `${comboCount > 1 ? comboCount + '連続正解！ ' : ''}${currentIdiom.word}`;
                document.getElementById('answer-meaning').innerText = currentIdiom.meaning;
                updateRemainingCount();
                saveGame(); // クリア時に自動セーブ
            } else {
                playSound('wrong');
                comboCount = 0;
                answerArea.style.transform = 'translateX(10px)';
                setTimeout(() => { answerArea.style.transform = 'translateX(0)'; }, 100);
            }
        };

        function updateArchiveView(filterText = '') {
            if (!archiveList) return;
            const filtered = solvedIdioms.filter(h => {
                const matchesSearch = h.word.includes(filterText) || h.reading.includes(filterText);
                const matchesFav = showFavoritesOnly ? h.isFavorite : true;
                return matchesSearch && matchesFav;
            });
            if (filtered.length > 0) {
                emptyArchiveMsg.style.display = 'none';
                archiveList.innerHTML = filtered.map(h => `
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                        <div class="flex-grow">
                            <div class="flex justify-between items-baseline">
                                <span class="text-xl font-bold kanji-font text-indigo-800">${h.word}</span>
                                <span class="text-xs text-gray-500">${h.reading}</span>
                            </div>
                            <p class="text-sm text-gray-700 mt-1">${h.meaning}</p>
                        </div>
                        <button onclick="toggleFavorite('${h.word}')" class="ml-4 text-2xl transition-transform active:scale-125">
                            ${h.isFavorite ? '⭐' : '☆'}
                        </button>
                    </div>
                `).join('');
            } else {
                emptyArchiveMsg.style.display = 'block';
                archiveList.innerHTML = '';
                emptyArchiveMsg.innerText = showFavoritesOnly ? 'お気に入りに登録された熟語はありません' : 
                                           (filterText ? '一致する熟語が見つかりません' : 'まだクリアした問題がありません');
            }
        }

        // イベントリスナー
        document.getElementById('reset-save-btn').onclick = resetGameData;
        document.getElementById('fav-filter-btn').onclick = (e) => {
            showFavoritesOnly = !showFavoritesOnly;
            e.target.innerText = showFavoritesOnly ? '⭐' : '☆';
            updateArchiveView(document.getElementById('archive-search').value);
        };
        document.getElementById('archive-search').addEventListener('input', (e) => updateArchiveView(e.target.value));
        document.getElementById('open-archive-btn').onclick = () => {
            document.getElementById('archive-search').value = '';
            updateArchiveView();
            archiveScreen.style.display = 'flex';
        };
        document.getElementById('close-archive-btn').onclick = () => archiveScreen.style.display = 'none';
        nextBtn.onclick = () => { 
    saveGame(); // まず保存
    setTimeout(() => { // ほんの少しだけ待ってから次へ
        currentStage++; 
        loadLevel(); 
    }, 50);
};
        rerollBtn.onclick = () => { comboCount = 0; loadLevel(); };

        // ページ読み込み時にデータ復元
        loadGame();
    </script>
</body>
